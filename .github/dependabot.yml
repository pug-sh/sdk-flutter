version: 2
updates:
  # Keep the GitHub Actions used by the workflows above up to date.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns: ["*"]

  # Watch pub dependencies. Grouped so minor/patch bumps land in one PR; the
  # CI workflow runs on each so regressions surface before merge.
  - package-ecosystem: pub
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    open-pull-requests-limit: 5
    groups:
      pub-minor-and-patch:
        update-types: ["minor", "patch"]
