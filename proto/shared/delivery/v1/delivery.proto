edition = "2023";
package shared.delivery.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/pug-sh/pug/internal/gen/proto/shared/delivery/v1;deliveryv1";

service DeliveryService {
  rpc RecordEvent(RecordEventRequest) returns (RecordEventResponse);
}

enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;
  EVENT_TYPE_CLICKED = 1;
  EVENT_TYPE_DISMISSED = 2;
  EVENT_TYPE_FAILED = 3;
  EVENT_TYPE_RECEIVED = 4;
  EVENT_TYPE_SENT = 5;
}

enum Platform {
  PLATFORM_UNSPECIFIED = 0;
  PLATFORM_ANDROID = 1;
  PLATFORM_IOS = 2;
}

message BatchDeliveryEvents {
  repeated DeliveryEventMessage events = 1;
}

message BatchMulticastMessage {
  string body = 1;
  string campaign_id = 2;
  string image = 3;
  string project_id = 4;
  repeated DeviceToken device_tokens = 5;
  string title = 6;
}

message BatchUnicastMessage {}

message DeliveryEvent {
  uint64 event_count = 1;
  EventType event_type = 2;
  Platform platform = 3;
  google.protobuf.Timestamp timestamp = 4;
}

message DeliveryEventMessage {
  string campaign_id = 1;
  google.protobuf.Timestamp event_timestamp = 2;
  EventType event_type = 3;
  map<string, string> metadata = 4;
  string message_id = 5;
  Platform platform = 6;
  string project_id = 7;
  string device_id = 8;
}

message RecordEventRequest {
  string campaign_id = 1 [(buf.validate.field).required = true];
  google.protobuf.Timestamp event_timestamp = 2;
  EventType event_type = 3;
  map<string, string> metadata = 4;
  string message_id = 5 [(buf.validate.field).required = true];
  Platform platform = 6;
  string device_id = 7 [(buf.validate.field).required = true];
}

message RecordEventResponse {
  string message = 1;
  int32 retry_after_seconds = 2;
  bool should_retry = 3;
  bool success = 4;
}

message DeviceToken {
  string device_id = 1;
  string token = 2;
}
