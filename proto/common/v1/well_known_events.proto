edition = "2023";
package common.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/pug-sh/pug/internal/gen/proto/common/v1;commonv1";

// Well-known event property schemas.
//
// These messages define typed properties for common event kinds. They do not
// change the Event wire format — SDKs serialize fields into
// Event.custom_properties (map<string, string>) before sending.
//
// Each message corresponds to an event kind string documented in its comment.
// SDKs use these to provide autocomplete, compile-time checks, and consistent
// type/struct hints across languages.

// Navigation events ──────────────────────────────────────────────────────────

// kind: "page_view"
message PageViewProperties {}

// kind: "click"
message ClickProperties {
  string class = 1;
  string id = 2;
  string tag = 3;
  string text = 4;
  int32 x = 5;
  int32 y = 6;
}

// kind: "rage_click"
message RageClickProperties {
  int32 click_count = 1 [(buf.validate.field).int32.gte = 2];
  string element = 2;
  int32 x = 3;
  int32 y = 4;
}

// kind: "dead_click"
message DeadClickProperties {
  string element = 1;
  string text = 2;
  int32 x = 3;
  int32 y = 4;
}

// kind: "scroll"
message ScrollProperties {
  int32 percent = 1 [(buf.validate.field).int32 = {
    gte: 0
    lte: 100
  }];
  int32 scroll_y = 2 [(buf.validate.field).int32.gte = 0];
}

// Commerce events ────────────────────────────────────────────────────────────

// kind: "search"
message SearchProperties {
  string query = 1 [(buf.validate.field).required = true];
}

// kind: "add_to_cart"
message AddToCartProperties {
  option (buf.validate.message).cel = {
    id: "add_to_cart.currency_with_amount"
    message: "currency is required when amount is set"
    expression: "this.amount == 0.0 || this.currency != ''"
  };
  string product_id = 1 [(buf.validate.field).required = true];
  double amount = 2 [(buf.validate.field).double.gt = 0];
  string currency = 3 [(buf.validate.field).string.len = 3];
}

// kind: "checkout_started"
message CheckoutStartedProperties {
  option (buf.validate.message).cel = {
    id: "checkout_started.currency_with_amount"
    message: "currency is required when amount is set"
    expression: "this.amount == 0.0 || this.currency != ''"
  };
  string product_id = 1 [(buf.validate.field).required = true];
  double amount = 2 [(buf.validate.field).double.gt = 0];
  string currency = 3 [(buf.validate.field).string.len = 3];
}

// kind: "checkout_completed"
message CheckoutCompletedProperties {
  option (buf.validate.message).cel = {
    id: "checkout_completed.currency_with_amount"
    message: "currency is required when amount is set"
    expression: "this.amount == 0.0 || this.currency != ''"
  };
  string product_id = 1 [(buf.validate.field).required = true];
  double amount = 2 [(buf.validate.field).double.gt = 0];
  string currency = 3 [(buf.validate.field).string.len = 3];
}

// kind: "purchase"
message PurchaseProperties {
  option (buf.validate.message).cel = {
    id: "purchase.currency_with_amount"
    message: "currency is required when amount is set"
    expression: "this.amount == 0.0 || this.currency != ''"
  };
  string product_id = 1 [(buf.validate.field).required = true];
  double amount = 2 [(buf.validate.field).double.gt = 0];
  string currency = 3 [(buf.validate.field).string.len = 3];
}

// Form events ────────────────────────────────────────────────────────────────

// kind: "form_start"
message FormStartProperties {
  string form_id = 1 [(buf.validate.field).required = true];
  string form_name = 2;
}

// kind: "form_submit"
message FormSubmitProperties {
  string action = 1;
  string form_id = 2 [(buf.validate.field).required = true];
  string form_name = 3;
}

// Auth events ────────────────────────────────────────────────────────────────

// kind: "signup"
message SignupProperties {}

// kind: "login"
message LoginProperties {}

// kind: "logout"
message LogoutProperties {}

// App lifecycle events ───────────────────────────────────────────────────────

// kind: "app_open"
message AppOpenProperties {}

// kind: "app_close"
message AppCloseProperties {}

// Notification events ────────────────────────────────────────────────────────

// kind: "notification_received"
message NotificationReceivedProperties {
  string campaign_id = 1 [(buf.validate.field).required = true];
  string notification_type = 2;
}

// kind: "notification_clicked"
message NotificationClickedProperties {
  string campaign_id = 1 [(buf.validate.field).required = true];
  string notification_type = 2;
}

// kind: "notification_dismissed"
message NotificationDismissedProperties {
  string campaign_id = 1 [(buf.validate.field).required = true];
