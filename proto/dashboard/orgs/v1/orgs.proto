edition = "2023";
package dashboard.orgs.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/pug-sh/pug/internal/gen/proto/dashboard/orgs/v1;orgsv1";

enum OrgRole {
  ORG_ROLE_UNSPECIFIED = 0;
  ORG_ROLE_ADMIN = 1;
  ORG_ROLE_MEMBER = 2;
}

enum InvitationStatus {
  INVITATION_STATUS_UNSPECIFIED = 0;
  INVITATION_STATUS_PENDING = 1;
  INVITATION_STATUS_ACCEPTED = 2;
}

service OrgsService {
  rpc List(ListRequest) returns (ListResponse) {}
  rpc Get(GetRequest) returns (GetResponse) {}
  rpc UpdateDisplayName(UpdateDisplayNameRequest) returns (UpdateDisplayNameResponse) {}
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse) {}
  rpc RemoveMember(RemoveMemberRequest) returns (RemoveMemberResponse) {}
  rpc InviteMember(InviteMemberRequest) returns (InviteMemberResponse) {}
  rpc AcceptInvite(AcceptInviteRequest) returns (AcceptInviteResponse) {}
  rpc ListInvitations(ListInvitationsRequest) returns (ListInvitationsResponse) {}
}

message Org {
  string display_name = 1;
  string id = 2;
}

message OrgMember {
  string customer_id = 1;
  string display_name = 2;
  string email = 3;
  string org_id = 4;
  OrgRole role = 5;
}

message OrgInvitation {
  string email = 1;
  string expires_at = 2;
  string id = 3;
  string org_id = 4;
  InvitationStatus status = 5;
  string token = 6;
}

message ListRequest {}

message ListResponse {
  repeated Org orgs = 1;
}

message GetRequest {
  string org_id = 1 [(buf.validate.field).required = true];
}

message GetResponse {
  Org org = 1;
}

message UpdateDisplayNameRequest {
  string display_name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.max_len = 150
  ];
  string org_id = 2 [(buf.validate.field).required = true];
}

message UpdateDisplayNameResponse {
  Org org = 1;
}

message ListMembersRequest {
  string org_id = 1 [(buf.validate.field).required = true];
}

message ListMembersResponse {
  repeated OrgMember members = 1;
}

message RemoveMemberRequest {
  string customer_id = 1 [(buf.validate.field).required = true];
  string org_id = 2 [(buf.validate.field).required = true];
}

message RemoveMemberResponse {}

message InviteMemberRequest {
  string email = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.email = true
  ];
  string org_id = 2 [(buf.validate.field).required = true];
}

message InviteMemberResponse {
  OrgInvitation invitation = 1;
}

message AcceptInviteRequest {
  string token = 1 [(buf.validate.field).required = true];
}

message AcceptInviteResponse {
  Org org = 1;
}

message ListInvitationsRequest {
  string org_id = 1 [(buf.validate.field).required = true];
}

message ListInvitationsResponse {
  repeated OrgInvitation invitations = 1;
}
